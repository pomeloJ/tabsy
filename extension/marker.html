<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Tabsy Workspace</title>
  <style>
    :root {
      --color: #0078d4;
      --color-dim: color-mix(in srgb, var(--color) 15%, transparent);
      --color-border: color-mix(in srgb, var(--color) 25%, transparent);
    }
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      background: #0d0d0d;
      color: #b0b0b0;
      height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      user-select: none;
    }
    .container {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 28px;
      max-width: 520px;
      width: 100%;
      padding: 0 24px;
    }

    /* Header */
    .header {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 16px;
    }
    .logo {
      width: 48px;
      height: 48px;
      opacity: 0.4;
    }
    .badge {
      display: inline-flex;
      align-items: center;
      gap: 10px;
      background: #141414;
      border: 1px solid var(--color-border);
      border-radius: 12px;
      padding: 14px 24px;
    }
    .color-dot {
      width: 12px;
      height: 12px;
      border-radius: 50%;
      background: var(--color);
      flex-shrink: 0;
      box-shadow: 0 0 10px color-mix(in srgb, var(--color) 60%, transparent);
    }
    .ws-name {
      font-size: 18px;
      font-weight: 600;
      color: #fff;
      letter-spacing: 0.01em;
    }

    /* Stats row */
    .stats {
      display: flex;
      gap: 12px;
      width: 100%;
    }
    .stat-card {
      flex: 1;
      background: #141414;
      border: 1px solid #1e1e1e;
      border-radius: 10px;
      padding: 14px 16px;
      text-align: center;
    }
    .stat-value {
      font-size: 22px;
      font-weight: 700;
      color: #fff;
      line-height: 1;
    }
    .stat-label {
      font-size: 11px;
      color: #666;
      margin-top: 4px;
    }

    /* Timeline */
    .timeline {
      width: 100%;
      background: #141414;
      border: 1px solid #1e1e1e;
      border-radius: 10px;
      padding: 16px 18px;
    }
    .timeline-title {
      font-size: 11px;
      font-weight: 600;
      color: #555;
      text-transform: uppercase;
      letter-spacing: 0.05em;
      margin-bottom: 12px;
    }
    .timeline-item {
      display: flex;
      align-items: flex-start;
      gap: 10px;
      padding: 6px 0;
    }
    .timeline-dot {
      width: 6px;
      height: 6px;
      border-radius: 50%;
      background: var(--color);
      margin-top: 5px;
      flex-shrink: 0;
    }
    .timeline-dot.dim {
      background: #333;
    }
    .timeline-text {
      font-size: 12px;
      color: #888;
      line-height: 1.4;
    }
    .timeline-text strong {
      color: #ccc;
      font-weight: 500;
    }
    .timeline-text .time {
      color: #555;
      font-size: 11px;
    }

    /* Groups list */
    .groups {
      width: 100%;
      background: #141414;
      border: 1px solid #1e1e1e;
      border-radius: 10px;
      padding: 16px 18px;
      display: none;
    }
    .groups-title {
      font-size: 11px;
      font-weight: 600;
      color: #555;
      text-transform: uppercase;
      letter-spacing: 0.05em;
      margin-bottom: 10px;
    }
    .group-row {
      display: flex;
      align-items: center;
      gap: 8px;
      padding: 5px 0;
    }
    .group-color {
      width: 8px;
      height: 8px;
      border-radius: 2px;
      flex-shrink: 0;
    }
    .group-name {
      font-size: 12px;
      color: #aaa;
      flex: 1;
    }
    .group-count {
      font-size: 11px;
      color: #555;
    }

    /* Hint */
    .hint {
      font-size: 11px;
      color: #333;
    }
  </style>
</head>
<body>
  <div class="container">
    <div class="header">
      <img class="logo" src="icons/icon.png" alt="Tabsy">
      <div class="badge">
        <div class="color-dot" id="dot"></div>
        <span class="ws-name" id="name">Workspace</span>
      </div>
    </div>

    <div class="stats">
      <div class="stat-card">
        <div class="stat-value" id="tabCount">—</div>
        <div class="stat-label" id="tabLabel">Tabs</div>
      </div>
      <div class="stat-card">
        <div class="stat-value" id="groupCount">—</div>
        <div class="stat-label" id="groupLabel">Groups</div>
      </div>
      <div class="stat-card">
        <div class="stat-value" id="pinnedCount">—</div>
        <div class="stat-label" id="pinnedLabel">Pinned</div>
      </div>
    </div>

    <div class="timeline" id="timeline">
      <div class="timeline-title" id="timelineTitle">Timeline</div>
    </div>

    <div class="groups" id="groups">
      <div class="groups-title" id="groupsTitle">Groups</div>
      <div id="groupList"></div>
    </div>

    <div class="hint" id="hint">This tab is a Tabsy workspace marker — do not close</div>
  </div>
  <script src="marker.js"></script>
</body>
</html>
